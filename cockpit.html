<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yannn8n.work — Cockpit</title>
<meta name="description" content="Spaceship cockpit dashboard for yannn8n.work — AI agents, automation, monitoring, cloud." />
<meta name="theme-color" content="#060810" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⟐</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c49a3c;
    --gold-glow: rgba(196,154,60,0.15);
    --green: #4ade80;
    --cyan: #4fc3f7;
    --panel: rgba(8,12,24,0.85);
    --panel-border: rgba(196,154,60,0.12);
    --text: #c8d0d8;
    --text-dim: #6a7a8a;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Orbitron', monospace;
  }

  html, body {
    height: 100%;
    background: #060810;
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    gap: 8px;
  }

  /* ═══ TOP BAR ═══ */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .top-bar .sys-name {
    font-family: var(--display);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
  }
  .top-bar .sys-name span { color: var(--cyan); opacity: 0.4; }
  .top-bar .sys-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top-bar .sys-status .indicator {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .top-bar .sys-status .label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .mode-links {
    display: flex;
    gap: 4px;
  }
  .mode-links a {
    font-family: var(--mono);
    font-size: 0.55rem;
    padding: 4px 10px;
    border-radius: 4px;
    text-decoration: none;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    background: var(--panel);
    transition: all 0.3s;
    letter-spacing: 0.08em;
  }
  .mode-links a:hover {
    border-color: rgba(196,154,60,0.3);
    color: var(--gold);
  }
  .mode-links a.active {
    border-color: rgba(196,154,60,0.3);
    color: var(--gold);
    background: rgba(196,154,60,0.08);
  }

  /* ═══ VIEWPORT (spaceship window) ═══ */
  .viewport {
    flex: 1;
    min-height: 0;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(196,154,60,0.1);
    background: #000;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.8),
      0 0 30px rgba(196,154,60,0.03);
  }

  .viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 1px solid rgba(196,154,60,0.06);
    pointer-events: none;
    z-index: 2;
  }

  /* Glass reflection overlay */
  .viewport::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(
      170deg,
      rgba(196,154,60,0.03) 0%,
      transparent 30%,
      transparent 70%,
      rgba(196,154,60,0.015) 100%
    );
    pointer-events: none;
    z-index: 2;
  }

  .viewport iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }

  /* Viewport corner HUD overlays */
  .viewport .vp-corner {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    font-family: var(--mono);
    font-size: 0.5rem;
    color: rgba(196,154,60,0.25);
    letter-spacing: 0.1em;
  }
  .viewport .vp-tl { top: 8px; left: 10px; }
  .viewport .vp-tr { top: 8px; right: 10px; text-align: right; }
  .viewport .vp-bl { bottom: 8px; left: 10px; }
  .viewport .vp-br { bottom: 8px; right: 10px; text-align: right; }

  /* viewport center HUD reticle */
  .viewport .reticle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
    opacity: 0.12;
  }
  .viewport .reticle svg { width: 40px; height: 40px; }

  /* ═══ SERVICE BUTTONS ═══ */
  .controls {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: linear-gradient(180deg, rgba(12,18,32,0.9) 0%, rgba(6,10,20,0.95) 100%);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .ctrl-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,154,60,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ctrl-btn:hover::before { opacity: 1; }

  .ctrl-btn:hover {
    border-color: rgba(196,154,60,0.3);
    background: linear-gradient(180deg, rgba(16,24,40,0.9) 0%, rgba(8,14,28,0.95) 100%);
    transform: translateY(-1px);
  }
  .ctrl-btn:active {
    transform: translateY(1px) scale(0.98);
    transition-duration: 0.05s;
  }

  .ctrl-btn .led {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-right: 2px;
  }
  .led-online   { background: var(--green); box-shadow: 0 0 5px rgba(74,222,128,0.4); }
  .led-tunnel   { background: #60a5fa; box-shadow: 0 0 5px rgba(96,165,250,0.3); }
  .led-external { background: var(--gold); box-shadow: 0 0 5px var(--gold-glow); }
  .led-nas      { background: #a78bfa; box-shadow: 0 0 5px rgba(167,139,250,0.3); }
  .led-cloud    { background: #f472b6; box-shadow: 0 0 5px rgba(244,114,182,0.3); }

  .ctrl-btn .icon {
    font-size: 0.8rem;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .ctrl-btn:hover .icon { opacity: 1; }

  .ctrl-btn .info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .ctrl-btn .info .name {
    font-family: var(--mono);
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .ctrl-btn .info .desc {
    font-family: var(--mono);
    font-size: 0.48rem;
    color: var(--text-dim);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ═══ BOTTOM STATUS ═══ */
  .bottom-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 4px;
  }
  .bottom-bar .status-msg {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .bottom-bar .status-msg span { color: var(--green); }

  .bottom-bar .right-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bottom-bar .time-display {
    font-family: var(--display);
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Radar */
  #hud-radar {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    opacity: 0.35;
  }
  #hud-radar svg { width: 100%; height: 100%; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width: 700px) {
    body { padding: 6px 8px; gap: 5px; }
    .controls { grid-template-columns: repeat(2, 1fr); gap: 4px; }
    .ctrl-btn { padding: 5px 6px; }
    .ctrl-btn .icon { font-size: 0.7rem; }
    .ctrl-btn .info .name { font-size: 0.55rem; }
    .ctrl-btn .info .desc { font-size: 0.42rem; }
    .ctrl-btn .led { width: 4px; height: 4px; }
    .viewport { border-radius: 8px; min-height: 120px; }
    .viewport .vp-corner { display: none; }
    .viewport .reticle { display: none; }
    .mode-links a { font-size: 0.45rem; padding: 3px 6px; }
  }

  @media (max-width: 380px) {
    .top-bar .sys-name { font-size: 0.55rem; }
    .bottom-bar .status-msg { font-size: 0.45rem; }
    #hud-radar { width: 32px; height: 32px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="sys-name"><span>⟐</span> YANN8N.WORK</div>
  <div class="sys-status">
    <span class="indicator"></span>
    <span class="label">FLIGHT·ONLINE</span>
  </div>
  <div class="mode-links">
    <a href="./">◈ DASH</a>
    <a class="active">⟐ COCKPIT</a>
  </div>
</div>

<!-- VIEWPORT (spaceship window) -->
<div class="viewport">
  <iframe
    src="https://www.youtube.com/embed/86YLFOog4GM?autoplay=1&loop=1&playlist=86YLFOog4GM&controls=0&showinfo=0&rel=0&mute=1&modestbranding=1"
    allow="autoplay; encrypted-media"
    loading="lazy"
  ></iframe>
  <div class="vp-corner vp-tl">SYS·MON · FRAME 001</div>
  <div class="vp-corner vp-tr">VIEWPORT · ACTIVE</div>
  <div class="vp-corner vp-bl">ALT 408KM · VEL 7.66KM/S</div>
  <div class="vp-corner vp-br">SIG · NOMINAL</div>
  <div class="reticle">
    <svg viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(196,154,60,0.3)" stroke-width="0.5">
        <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <line x1="20" y1="2"  x2="20" y2="10" stroke="rgba(196,154,60,0.2)" stroke-width="0.5"/>
      <line x1="20" y1="30" x2="20" y2="38" stroke="rgba(196,154,60,0.2)" stroke-width="0.5"/>
      <line x1="2"  y1="20" x2="10" y2="20" stroke="rgba(196,154,60,0.2)" stroke-width="0.5"/>
      <line x1="30" y1="20" x2="38" y2="20" stroke="rgba(196,154,60,0.2)" stroke-width="0.5"/>
    </svg>
  </div>
</div>

<!-- SERVICE BUTTONS -->
<div class="controls" id="controls"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="status-msg">ALL SYSTEMS · <span>NOMINAL</span></div>
  <div class="right-group">
    <span class="time-display" id="time-display"></span>
    <div id="hud-radar">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(196,154,60,0.12)" stroke-width="0.5"/>
        <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(196,154,60,0.08)" stroke-width="0.4"/>
        <circle cx="50" cy="50" r="12" fill="none" stroke="rgba(196,154,60,0.05)" stroke-width="0.3"/>
        <line x1="5" y1="50" x2="95" y2="50" stroke="rgba(196,154,60,0.04)" stroke-width="0.3"/>
        <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(196,154,60,0.04)" stroke-width="0.3"/>
        <line x1="50" y1="50" x2="95" y2="50" stroke="rgba(196,154,60,0.2)" stroke-width="0.8">
          <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite"/>
        </line>
        <circle cx="65" cy="30" r="1.5" fill="rgba(196,154,60,0.3)"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
        <circle cx="28" cy="58" r="1" fill="rgba(196,154,60,0.2)"><animate attributeName="opacity" values="0.2;0.03;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
        <circle cx="42" cy="22" r="1.2" fill="rgba(196,154,60,0.25)"><animate attributeName="opacity" values="0.25;0.04;0.25" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="72" cy="62" r="0.8" fill="rgba(196,154,60,0.15)"><animate attributeName="opacity" values="0.15;0.02;0.15" dur="4s" repeatCount="indefinite"/></circle>
      </svg>
    </div>
  </div>
</div>

<script>
const services = [
  { name: 'HERMES',     url: 'https://hermes.yannn8n.work',    icon: '⚡', desc: 'Agent Platform',       led: 'led-online' },
  { name: 'OPENCODE',   url: 'https://opencode.yannn8n.work',  icon: '⌨️', desc: 'Coding Agent',         led: 'led-online' },
  { name: 'OMNION',     url: 'https://omnion.yannn8n.work',    icon: '🔄', desc: 'Web Interface',        led: 'led-online' },
  { name: 'OLLAMA',     url: 'https://ollama.yannn8n.work',    icon: '🧠', desc: 'Local AI Models',      led: 'led-tunnel' },
  { name: 'N8N',        url: 'https://n8n.yannn8n.work',       icon: '🔗', desc: 'Workflow Automation',  led: 'led-tunnel' },
  { name: 'VAULTWARDEN',url: 'https://vault.yannn8n.work',     icon: '🔑', desc: 'Password Manager',     led: 'led-tunnel' },
  { name: 'LOG',        url: 'https://log.yannn8n.work',       icon: '📋', desc: '업무 관리 시스템',       led: 'led-external' },
  { name: 'BLOG',       url: 'https://blog.yannn8n.work',      icon: '📝', desc: 'Tech & Journal',       led: 'led-external' },
  { name: 'ODNMON',     url: 'https://odnmon.netlify.app',     icon: '📡', desc: '관측기기 모니터링',       led: 'led-external' },
  { name: 'NAS',        url: 'http://ymseo123132.asuscomm.com',icon: '🗄️', desc: 'Network Storage',       led: 'led-nas' },
  { name: 'GITHUB',     url: 'https://github.com/ymseo741',    icon: '💻', desc: 'Code Repository',       led: 'led-external' },
  { name: 'CLOUDFLARE', url: 'https://dash.cloudflare.com',    icon: '🌐', desc: 'Tunnel & DNS',         led: 'led-cloud' },
  { name: 'ORACLE VPC', url: 'https://cloud.oracle.com',       icon: '☁️', desc: 'Cloud Server Console',  led: 'led-cloud' },
  { name: 'AGENTMAIL',  url: 'https://agentmail.to',           icon: '✉️', desc: 'AI Agent Mailbox',      led: 'led-external' },
  { name: 'FLOWSTATES', url: 'https://flowstates.netlify.app', icon: '🎵', desc: '인터렉티브 콘텐츠 뷰어',    led: 'led-external' },
  { name: 'TRIPVERSE',  url: 'https://tripversemate.netlify.app',icon:'✈️', desc: '인터렉티브 트립 뷰어',     led: 'led-external' },
];

function renderButtons() {
  const grid = document.getElementById('controls');
  grid.innerHTML = services.map(s => `
    <a href="${s.url}" class="ctrl-btn" target="_blank" rel="noopener">
      <span class="led ${s.led}"></span>
      <span class="icon">${s.icon}</span>
      <span class="info">
        <span class="name">${s.name}</span>
        <span class="desc">${s.desc}</span>
      </span>
    </a>
  `).join('');
}

function updateTime() {
  const el = document.getElementById('time-display');
  if (!el) return;
  const now = new Date();
  const opts = { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
  el.textContent = now.toLocaleString('ko-KR', opts) + ' KST';
}

renderButtons();
updateTime();
setInterval(updateTime, 1000);
</script>
</body>
</html>
