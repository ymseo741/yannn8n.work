<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yannn8n.work — Personal Cloud</title>
<meta name="description" content="Personal ecosystem dashboard for yannn8n.work — AI agents, automation, monitoring, cloud infrastructure and tools." />
<meta property="og:title" content="yannn8n.work" />
<meta property="og:description" content="Personal cloud ecosystem dashboard" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0a0e17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a0e17;
    --gold: #c49a3c;
    --gold-light: #f0c75e;
    --gold-glow: rgba(196, 154, 60, 0.35);
    --text: #e8e6e3;
    --text-dim: #9aabbb;
    --text-muted: #6a7a8a;
    --card-bg: rgba(17, 24, 39, 0.65);
    --card-border: rgba(196, 154, 60, 0.1);
    --card-hover-border: rgba(196, 154, 60, 0.4);
    --radius: 16px;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Canvas ===== */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ===== Mouse glow overlay (JS-driven) ===== */
  #mouse-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: background 0.15s ease;
  }

  /* ===== Aurora overlay ===== */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 55% at 25% 25%, rgba(196, 154, 60, 0.04) 0%, transparent 70%),
      radial-gradient(ellipse 55% 45% at 75% 15%, rgba(100, 140, 200, 0.035) 0%, transparent 60%),
      radial-gradient(ellipse 65% 40% at 50% 80%, rgba(196, 154, 60, 0.03) 0%, transparent 60%);
    animation: aurora-shift 30s ease-in-out infinite alternate;
  }

  @keyframes aurora-shift {
    0%   { filter: hue-rotate(-10deg) saturate(0.8); }
    50%  { filter: hue-rotate(15deg)  saturate(1.1); }
    100% { filter: hue-rotate(-5deg)  saturate(0.9); }
  }

  /* SVG line highlight on card hover */
  .ln-active {
    stroke: #f0c75e !important;
    opacity: 0.9 !important;
    stroke-width: 1.8 !important;
    transition: stroke 0.3s, opacity 0.3s, stroke-width 0.3s;
  }

  /* ===== Container ===== */
  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  /* ===== SVG Topology ===== */
  #topology-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  /* ===== Center Brand ===== */
  .center-brand {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 1.6rem;
    user-select: none;
  }

  .center-brand .glow {
    position: absolute;
    width: 360px;
    height: 360px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse-glow 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.65; transform: translate(-50%, -50%) scale(1.12); }
  }

  .center-brand h1 {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0c75e, #c49a3c, #d4a84a, #f0c75e);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
    position: relative;
    cursor: default;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .center-brand .subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: var(--mono);
    opacity: 0.7;
  }

  /* ===== Service Grid ===== */
  .services-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    max-width: 880px;
    width: 100%;
  }

  .service-card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.1rem 0.9rem 0.9rem;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), border-color 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    will-change: transform;
    transform-style: preserve-3d;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, transparent 30%, rgba(196, 154, 60, 0.07) 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .service-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, transparent 40%, rgba(196, 154, 60, 0.15), transparent 60%) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .service-card:hover {
    border-color: transparent;
    transform: translateY(-5px) scale(1.02);
    box-shadow:
      0 12px 50px rgba(196, 154, 60, 0.12),
      0 0 0 1px rgba(196, 154, 60, 0.08) inset;
  }

  .service-card:hover::before { opacity: 1; }
  .service-card:hover::after  { opacity: 1; }

  .service-card:active {
    transform: scale(0.97);
    transition-duration: 0.08s;
  }

  .service-card .icon {
    font-size: 1.7rem;
    line-height: 1;
    margin-bottom: 0.45rem;
    display: block;
    transition: transform 0.3s ease;
  }

  .service-card:hover .icon {
    transform: scale(1.15);
  }

  .service-card .name {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .service-card .name .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    transition: box-shadow 0.3s;
  }

  .service-card:hover .status-dot {
    box-shadow: 0 0 10px currentColor !important;
  }

  .dot-online   { background: #4ade80; box-shadow: 0 0 5px rgba(74,222,128,0.5); color: #4ade80; }
  .dot-tunnel   { background: #60a5fa; box-shadow: 0 0 5px rgba(96,165,250,0.4); color: #60a5fa; }
  .dot-external { background: var(--gold-light); box-shadow: 0 0 5px var(--gold-glow); color: var(--gold-light); }
  .dot-nas      { background: #a78bfa; box-shadow: 0 0 5px rgba(167,139,250,0.4); color: #a78bfa; }
  .dot-cloud    { background: #f472b6; box-shadow: 0 0 5px rgba(244,114,182,0.4); color: #f472b6; }

  .service-card .desc {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 0.1rem;
    transition: color 0.3s;
  }

  .service-card:hover .desc {
    color: var(--text);
  }

  .service-card .tag {
    position: absolute;
    top: 0.55rem;
    right: 0.55rem;
    font-size: 0.55rem;
    font-family: var(--mono);
    padding: 0.12rem 0.4rem;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    background: rgba(255,255,255,0.025);
    letter-spacing: 0.05em;
    transition: all 0.3s;
    pointer-events: none;
  }

  .service-card:hover .tag {
    border-color: rgba(196, 154, 60, 0.2);
    color: var(--gold);
    background: rgba(196, 154, 60, 0.05);
  }

  /* ===== Footer ===== */
  .footer {
    position: relative;
    z-index: 2;
    margin-top: 1.2rem;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(136, 153, 170, 0.35);
    font-family: var(--mono);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .footer a:hover { opacity: 1; }

  .footer .count {
    color: var(--text-muted);
    opacity: 0.5;
  }

  /* ===== Responsove ===== */
  @media (max-width: 820px) {
    .services-grid { gap: 0.75rem; max-width: 600px; }
  }

  @media (max-width: 650px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
      max-width: 420px;
      gap: 0.65rem;
    }
    .center-brand h1 { font-size: 2.2rem; }
    .center-brand { margin-bottom: 1rem; }
    .container { padding: 0.8rem; }
    .service-card { padding: 0.85rem 0.7rem; }
    .service-card .icon { font-size: 1.4rem; }
    .service-card .name { font-size: 0.85rem; }
    .service-card .desc { font-size: 0.65rem; }
    .service-card .tag { display: none; }
    .footer { font-size: 0.6rem; }
  }

  @media (max-width: 380px) {
    .services-grid { gap: 0.5rem; }
    .center-brand h1 { font-size: 1.6rem; }
    .center-brand .subtitle { font-size: 0.65rem; letter-spacing: 0.2em; }
  }

  /* ═══════════════════════════════════════════════════════
     COCKPIT MODE
     ═══════════════════════════════════════════════════════ */

  /* ── Mode toggle ── */
  .mode-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    background: rgba(17,24,39,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(196,154,60,0.2);
    border-radius: 8px;
    padding: 0.35rem;
    display: flex;
    gap: 0.2rem;
    cursor: pointer;
    transition: border-color 0.3s;
  }
  .mode-toggle:hover { border-color: rgba(196,154,60,0.5); }

  .mode-btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.35rem 0.7rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    transition: all 0.3s;
  }
  .mode-btn.active {
    background: rgba(196,154,60,0.15);
    color: var(--gold);
  }
  .mode-btn:not(.active):hover { color: var(--text-dim); }

  /* ── HUD overlay (cockpit decorations) ── */
  #hud-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s;
  }

  .cockpit-mode #hud-overlay { opacity: 1; }

  /* Corner brackets */
  #hud-overlay .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: rgba(196,154,60,0.2);
    border-style: solid;
  }
  #hud-overlay .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  #hud-overlay .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  #hud-overlay .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  #hud-overlay .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* Top HUD bar */
  #hud-overlay .hud-top {
    position: absolute;
    top: 16px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,154,60,0.15), transparent);
  }

  /* Scanlines overlay */
  #hud-overlay .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Cockpit mode body ── */
  .cockpit-mode {
    background: #050810;
  }

  .cockpit-mode #stars-canvas { opacity: 0.15; }
  .cockpit-mode .aurora { opacity: 0; }

  .cockpit-mode #topology-svg { opacity: 0.1; }

  .cockpit-mode .center-brand h1 {
    font-size: 2rem;
    letter-spacing: 0.2em;
    background: none;
    -webkit-text-fill-color: initial;
    background-clip: initial;
    color: var(--gold);
    font-family: var(--mono);
    font-weight: 400;
    animation: none;
    text-shadow: 0 0 20px rgba(196,154,60,0.3);
  }
  .cockpit-mode .center-brand h1::before {
    content: 'SYS:// ';
    font-size: 0.6em;
    color: var(--text-muted);
    font-weight: 300;
  }

  .cockpit-mode .center-brand .glow { display: none; }

  .cockpit-mode .center-brand .subtitle {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    opacity: 0.4;
  }

  .cockpit-mode .container {
    justify-content: flex-start;
    padding-top: 4rem;
  }

  .cockpit-mode .center-brand { margin-bottom: 1rem; }

  /* ── Cockpit service cards ── */
  .cockpit-mode .services-grid { max-width: 900px; }

  .cockpit-mode .service-card {
    background: rgba(5,8,16,0.6);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(196,154,60,0.08);
    border-radius: 4px;
    padding: 0.7rem 0.65rem;
    font-family: var(--mono);
    position: relative;
    overflow: hidden;
  }

  .cockpit-mode .service-card::before {
    background: linear-gradient(135deg, transparent 30%, rgba(196,154,60,0.03) 100%);
  }

  .cockpit-mode .service-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,154,60,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cockpit-mode .service-card:hover::after { opacity: 1; }

  .cockpit-mode .service-card:hover {
    transform: translateY(-2px);
    border-color: rgba(196,154,60,0.3);
    box-shadow: 0 4px 20px rgba(196,154,60,0.08), inset 0 0 20px rgba(196,154,60,0.02);
  }
  .cockpit-mode .service-card:active { transform: scale(0.97); }

  .cockpit-mode .service-card .icon {
    font-size: 0.8rem;
    margin-bottom: 0.2rem;
    opacity: 0.5;
  }
  .cockpit-mode .service-card:hover .icon { opacity: 1; transform: none; }

  .cockpit-mode .service-card .name {
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    gap: 0.4rem;
  }

  .cockpit-mode .service-card .name::before {
    content: '▶ ';
    font-size: 0.5rem;
    color: var(--text-muted);
  }

  .cockpit-mode .service-card .status-dot {
    width: 4px;
    height: 4px;
    margin-left: auto;
  }

  .cockpit-mode .service-card .desc {
    font-size: 0.58rem;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 0.05rem;
  }
  .cockpit-mode .service-card:hover .desc { color: var(--text-dim); }

  .cockpit-mode .service-card .tag { display: none; }

  .cockpit-mode .footer {
    margin-top: 0.8rem;
    opacity: 0.4;
    font-size: 0.6rem;
  }

  /* ── Radar widget ── */
  #hud-radar {
    position: fixed;
    bottom: 70px;
    right: 20px;
    z-index: 0;
    width: 80px;
    height: 80px;
    opacity: 0;
    transition: opacity 0.8s;
    pointer-events: none;
  }
  .cockpit-mode #hud-radar { opacity: 0.4; }
  #hud-radar svg { width: 100%; height: 100%; }

  /* ── Responsive: cockpit ── */
  @media (max-width: 650px) {
    .cockpit-mode .center-brand h1 { font-size: 1.4rem; }
    .cockpit-mode .container { padding-top: 3rem; }
    .cockpit-mode .service-card { padding: 0.6rem 0.5rem; }
    .cockpit-mode .service-card .name { font-size: 0.65rem; }
    .cockpit-mode .service-card .icon { display: none; }
    .cockpit-mode .service-card .name::before { content: ''; }
    .mode-btn { font-size: 0.55rem; padding: 0.25rem 0.5rem; }
    #hud-radar { display: none; }
  }

</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="mouse-glow"></div>
<div class="aurora"></div>

<!-- ── Mode toggle ── -->
<div class="mode-toggle" id="mode-toggle">
  <button class="mode-btn active" data-mode="dashboard">◈ DASH</button>
  <a href="cockpit.html" class="mode-btn" style="text-decoration:none">⟐ COCKPIT</a>
</div>

<!-- ── HUD overlay (cockpit decorations) ── -->
<div id="hud-overlay">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="hud-top"></div>
  <div class="scanlines"></div>
</div>

<!-- ── Radar widget ── -->
<div id="hud-radar">
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(196,154,60,0.15)" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(196,154,60,0.1)" stroke-width="0.4"/>
    <circle cx="50" cy="50" r="15" fill="none" stroke="rgba(196,154,60,0.08)" stroke-width="0.3"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="rgba(196,154,60,0.06)" stroke-width="0.3"/>
    <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(196,154,60,0.06)" stroke-width="0.3"/>
    <line id="radar-sweep" x1="50" y1="50" x2="95" y2="50" stroke="rgba(196,154,60,0.3)" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Blips -->
    <circle cx="65" cy="35" r="2" fill="rgba(196,154,60,0.4)"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="60" r="1.5" fill="rgba(196,154,60,0.3)"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="45" cy="25" r="1.8" fill="rgba(196,154,60,0.35)"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="65" r="1.2" fill="rgba(196,154,60,0.25)"><animate attributeName="opacity" values="0.25;0.05;0.25" dur="3.5s" repeatCount="indefinite"/></circle>
  </svg>
</div>

<svg id="topology-svg" viewBox="0 0 1000 1100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c49a3c" stop-opacity="0.05"/>
      <stop offset="50%"  stop-color="#c49a3c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c49a3c" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Center concentric rings -->
  <circle cx="500" cy="220" r="60" fill="none" stroke="url(#lg)" stroke-width="0.4" opacity="0.25">
    <animate attributeName="r" values="45;75;45" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="220" r="40" fill="none" stroke="url(#lg)" stroke-width="0.6" opacity="0.35">
    <animate attributeName="r" values="30;50;30" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="220" r="18" fill="rgba(196,154,60,0.06)" stroke="#c49a3c" stroke-width="1" filter="url(#fg)"/>
  <circle cx="500" cy="220" r="3" fill="#c49a3c" opacity="0.5" filter="url(#fg)"/>

  <!-- R1: y~380 (cols 0-3) -->
  <g fill="none" stroke="url(#lg)" stroke-width="0.9" filter="url(#fg)">
    <path id="ln-0"  d="M495 235 q-100 30-160 145" opacity="0.5"><animate attributeName="stroke-dasharray" values="0 400;300 100;0 400" dur="10s" repeatCount="indefinite"/></path>

<div class="container">
  <div class="center-brand">

    <span>· <a href="https://github.com/ymseo741">GitHub</a></span>

</div>

<script>
// ── Service data ──
const services = [
  { name: 'Hermes',     url: 'https://hermes.yannn8n.work',    icon: '⚡',  desc: 'Agent Platform',            tag: 'tunnel', cls: 'dot-online' },
  { name: 'OpenCode',   url: 'https://opencode.yannn8n.work',  icon: '⌨️', desc: 'Coding Agent',              tag: 'tunnel', cls: 'dot-online' },
  { name: 'OMNION',     url: 'https://omnion.yannn8n.work',    icon: '🔄', desc: 'Web Interface',             tag: 'tunnel', cls: 'dot-online' },
  { name: 'Ollama',     url: 'https://ollama.yannn8n.work',    icon: '🧠', desc: 'Local AI Models',           tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'n8n',        url: 'https://n8n.yannn8n.work',       icon: '🔗', desc: 'Workflow Automation',       tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'Vaultwarden',url: 'https://vault.yannn8n.work',     icon: '🔑', desc: 'Password Manager',          tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'Log',        url: 'https://log.yannn8n.work',       icon: '📋', desc: '업무 관리 시스템',            tag: 'netlify', cls: 'dot-external' },
  { name: 'Blog',       url: 'https://blog.yannn8n.work',      icon: '📝', desc: 'Tech & Journal',            tag: 'netlify', cls: 'dot-external' },
  { name: 'ODNMON',     url: 'https://odnmon.netlify.app',     icon: '📡', desc: '관측기기 모니터링',            tag: 'netlify', cls: 'dot-external' },
  { name: 'NAS',        url: 'http://vpn.yannn8n.work',icon: '🗄️', desc: 'Network Storage',            tag: 'ddns',    cls: 'dot-nas' },
  { name: 'GitHub',     url: 'https://github.com/ymseo741',    icon: '💻', desc: 'Code Repository',            tag: 'ext',     cls: 'dot-external' },
  { name: 'Cloudflare', url: 'https://dash.cloudflare.com',    icon: '🌐', desc: 'Tunnel & DNS',              tag: 'ext',     cls: 'dot-cloud' },
  { name: 'Oracle VPC', url: 'https://cloud.oracle.com',       icon: '☁️', desc: 'Cloud Server Console',       tag: 'cloud',   cls: 'dot-cloud' },
  { name: 'AgentMail',  url: 'https://agentmail.to',           icon: '✉️', desc: 'AI Agent Mailbox',           tag: 'ext',     cls: 'dot-external' },
  { name: 'FlowStates',url: 'https://flowstates.netlify.app', icon: '🎵', desc: '인터렉티브 콘텐츠 뷰어',         tag: 'netlify', cls: 'dot-external' },
  { name: 'Tripverse', url: 'https://tripversemate.netlify.app',icon: '✈️', desc: '인터렉티브 트립 콘텐츠 뷰어',     tag: 'netlify', cls: 'dot-external' },
];

function renderGrid() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = services.map(s => `
    <a href="${s.url}" class="service-card" target="_blank" rel="noopener">
      <span class="icon">${s.icon}</span>
      <div class="name">${s.name}<span class="status-dot ${s.cls}"></span></div>
      <div class="desc">${s.desc}</div>
      <span class="tag">${s.tag}</span>
    </a>
  `).join('');
  document.getElementById('service-count').textContent = services.length;
  attachCardTilt();
}

// ── Card tilt effect ──
function attachCardTilt() {
  const cards = document.querySelectorAll('.service-card');
  const lines = document.querySelectorAll('#topology-svg path[id^="ln-"]');
  for (const card of cards) {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      const cx = r.width / 2;
      const cy = r.height / 2;
      const dx = (x - cx) / cx;
      const dy = (y - cy) / cy;
      card.style.transform = `perspective(600px) rotateX(${-dy * 6}deg) rotateY(${dx * 6}deg) translateY(-3px) scale(1.02)`;
    });
    card.addEventListener('mouseenter', () => {
      // Highlight matching SVG line
      lines.forEach(l => l.classList.remove('ln-active'));
      const idx = Array.from(cards).indexOf(card);
      const target = document.getElementById(`ln-${idx}`);
      if (target) target.classList.add('ln-active');
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
      lines.forEach(l => l.classList.remove('ln-active'));
    });
  }
}

// ── Starfield canvas ──
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let shootingStars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const STAR_COUNT = 220;

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.6 + 0.3,
      alpha: Math.random() * 0.7 + 0.2,
      speed: Math.random() * 0.012 + 0.003,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function spawnShootingStar() {
  if (shootingStars.length > 3) return;
  const angle = Math.random() * 0.6 + 0.3;  // rad, shallow diagonal down-right
  const speed = Math.random() * 5 + 4;
  shootingStars.push({
    x: Math.random() * canvas.width * 0.5,
    y: Math.random() * canvas.height * 0.25,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: Math.random() * 100 + 50,
    alpha: 1,
  });
}

// ── Mouse glow ──
const glowEl = document.getElementById('mouse-glow');
let mouseX = -999, mouseY = -999;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('mouseleave', () => {
  mouseX = -999;
  mouseY = -999;
});

// ── Drawing ──
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = Date.now() * 0.001;

  // Stars
  for (const s of stars) {
    const flicker = Math.sin(time * s.speed + s.phase) * 0.35 + 0.65;
    const alpha = s.alpha * flicker;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  }

  // Constellation: connect nearby stars
  const CONNECT_DIST = 140;
  ctx.lineWidth = 0.3;
  for (let i = 0; i < stars.length; i += 3) {
    const a = stars[i];
    for (let j = i + 2; j < stars.length; j += 3) {
      const b = stars[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = dx * dx + dy * dy;
      if (dist < CONNECT_DIST * CONNECT_DIST) {
        const alpha = (1 - dist / (CONNECT_DIST * CONNECT_DIST)) * 0.08;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(196, 154, 60, ${alpha})`;
        ctx.stroke();
      }
    }
  }

  // Shooting stars – tail aligns WITH movement direction
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    // Normalize direction
    const mag = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
    if (mag < 0.01) { shootingStars.splice(i, 1); continue; }
    const nx = s.vx / mag;
    const ny = s.vy / mag;
    // Tail = behind the head along movement vector
    const tailX = s.x - nx * s.len;
    const tailY = s.y - ny * s.len;

    const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.6, `rgba(255,255,255,${s.alpha * 0.7})`);
    grad.addColorStop(1, `rgba(255,255,255,${s.alpha})`);
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    s.x += s.vx;
    s.y += s.vy;
    s.alpha -= 0.015;
    if (s.alpha <= 0) { shootingStars.splice(i, 1); }
  }
}

// ── Mouse glow update (lightweight, not per frame) ──
function updateMouseGlow() {
  if (mouseX >= 0 && mouseY >= 0) {
    glowEl.style.background = `radial-gradient(ellipse 200px 200px at ${mouseX}px ${mouseY}px, rgba(196, 154, 60, 0.04) 0%, transparent 100%)`;
  } else {
    glowEl.style.background = 'none';
  }
  requestAnimationFrame(updateMouseGlow);
}

setInterval(() => { if (Math.random() < 0.35) spawnShootingStar(); }, 2500);

// ── Time ──
function updateTime() {
  const el = document.getElementById('time-display');
  if (!el) return;
  const now = new Date();
  const kst = now.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', year: 'numeric', month: '2-digit', day: '2-digit' });
  el.textContent = '· ' + kst + ' KST';
}

// ── Main loop ──
function animate() {
  drawStars();
  requestAnimationFrame(animate);
}

renderGrid();
updateTime();
setInterval(updateTime, 1000);
animate();
updateMouseGlow();

window.addEventListener('resize', () => { resize(); initStars(); });

// ── Mode toggle ──
document.getElementById('mode-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn || btn.classList.contains('active')) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mode = btn.dataset.mode;
  document.body.classList.toggle('cockpit-mode', mode === 'cockpit');
});
</script>
