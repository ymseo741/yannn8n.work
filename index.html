<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yannn8n.work — Personal Cloud</title>
<meta name="description" content="Personal ecosystem dashboard for yannn8n.work — AI agents, automation, monitoring, storage and more." />
<meta property="og:title" content="yannn8n.work" />
<meta property="og:description" content="Personal cloud ecosystem dashboard" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0a0e17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a0e17;
    --navy-2: #111827;
    --navy-3: #1e2d3d;
    --gold: #c49a3c;
    --gold-light: #f0c75e;
    --gold-glow: rgba(196, 154, 60, 0.3);
    --text: #e8e6e3;
    --text-dim: #8899aa;
    --text-muted: #5a6a7a;
    --card-bg: rgba(17, 24, 39, 0.75);
    --card-border: rgba(196, 154, 60, 0.12);
    --card-hover-border: rgba(196, 154, 60, 0.35);
    --radius: 14px;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Canvas Background ===== */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ===== Aurora overlay ===== */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(196, 154, 60, 0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(100, 140, 200, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 80%, rgba(196, 154, 60, 0.03) 0%, transparent 60%);
  }

  /* ===== Main Container ===== */
  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  /* ===== SVG Topology ===== */
  #topology-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===== Center Brand ===== */
  .center-brand {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 2rem;
  }

  .center-brand .glow {
    position: absolute;
    width: 320px;
    height: 320px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse-glow 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.35; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.12); }
  }

  .center-brand h1 {
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0c75e, #c49a3c, #d4a84a, #f0c75e);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
    position: relative;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .center-brand .subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 0.4rem;
    font-family: var(--mono);
  }

  /* ===== Service Grid ===== */
  .services-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.9rem;
    max-width: 820px;
    width: 100%;
  }

  .service-card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1rem 0.85rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, transparent 30%, rgba(196, 154, 60, 0.06) 100%);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .service-card:hover {
    border-color: var(--card-hover-border);
    transform: translateY(-3px);
    box-shadow: 0 6px 30px rgba(196, 154, 60, 0.12), 0 0 0 1px rgba(196, 154, 60, 0.05) inset;
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card:active {
    transform: translateY(-1px);
  }

  .service-card .icon {
    font-size: 1.5rem;
    line-height: 1;
    margin-bottom: 0.4rem;
    display: block;
  }

  .service-card .name {
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 0.1rem;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .service-card .name .status {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .status.online { background: #4ade80; box-shadow: 0 0 6px rgba(74, 222, 128, 0.5); }
  .status.tunnel { background: #60a5fa; box-shadow: 0 0 6px rgba(96, 165, 250, 0.4); }
  .status.external { background: var(--gold-light); box-shadow: 0 0 6px var(--gold-glow); }
  .status.nas { background: #a78bfa; box-shadow: 0 0 6px rgba(167, 139, 250, 0.4); }

  .service-card .desc {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .service-card .tag {
    position: absolute;
    top: 0.55rem;
    right: 0.55rem;
    font-size: 0.6rem;
    font-family: var(--mono);
    padding: 0.12rem 0.4rem;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    letter-spacing: 0.05em;
  }

  .service-card:hover .tag {
    border-color: rgba(196, 154, 60, 0.2);
    color: var(--gold);
  }

  /* ===== Section labels ===== */
  .section-label {
    position: relative;
    z-index: 2;
    font-size: 0.65rem;
    font-family: var(--mono);
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.65rem;
    text-align: center;
    opacity: 0.6;
  }

  /* ===== Footer ===== */
  .footer {
    position: relative;
    z-index: 2;
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(136, 153, 170, 0.4);
    font-family: var(--mono);
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.3s;
  }

  .footer a:hover { opacity: 1; }

  .footer .count {
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ===== Responsive ===== */
  @media (max-width: 820px) {
    .services-grid { padding: 0 0.5rem; gap: 0.75rem; }
  }

  @media (max-width: 700px) {
    .services-grid { grid-template-columns: repeat(2, 1fr); max-width: 450px; gap: 0.7rem; }
    .center-brand h1 { font-size: 1.9rem; }
    .container { padding: 1rem; }
    .service-card { padding: 0.85rem 0.75rem; }
    .section-label { margin-bottom: 0.5rem; }
    .footer { margin-top: 1rem; }
  }

  @media (max-width: 400px) {
    .services-grid { gap: 0.55rem; }
    .service-card .icon { font-size: 1.2rem; }
    .service-card .name { font-size: 0.8rem; }
    .center-brand h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="aurora"></div>

<svg id="topology-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c49a3c" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#c49a3c" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c49a3c" stop-opacity="0.05" />
    </linearGradient>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Center node concentric rings -->
  <circle cx="500" cy="330" r="70" fill="none" stroke="url(#line-grad)" stroke-width="0.4" opacity="0.25">
    <animate attributeName="r" values="50;80;50" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="330" r="45" fill="none" stroke="url(#line-grad)" stroke-width="0.8" opacity="0.35">
    <animate attributeName="r" values="35;55;35" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="4.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="330" r="20" fill="rgba(196,154,60,0.06)" stroke="#c49a3c" stroke-width="1.2" filter="url(#line-glow)" />
  <circle cx="500" cy="330" r="4" fill="#c49a3c" opacity="0.6" filter="url(#line-glow)" />

  <!-- Lines from center (500,330) → each node -->
  <!-- Row 1 (cols 0-3) → y~520 -->
  <g fill="none" stroke="url(#line-grad)" stroke-width="1" filter="url(#line-glow)">
    <path d="M495 345 q -120 40 -170 175" opacity="0.5"><animate attributeName="stroke-dasharray" values="0 500;350 150;0 500" dur="10s" repeatCount="indefinite" /></path>
    <path d="M498 345 q -60 30 -90 175" opacity="0.5"><animate attributeName="stroke-dasharray" values="0 500;350 150;0 500" dur="10s" begin="1.1s" repeatCount="indefinite" /></path>
    <path d="M500 345 q 0 20 0 175" opacity="0.5"><animate attributeName="stroke-dasharray" values="0 500;350 150;0 500" dur="10s" begin="2.2s" repeatCount="indefinite" /></path>
    <path d="M502 345 q 60 30 90 175" opacity="0.5"><animate attributeName="stroke-dasharray" values="0 500;350 150;0 500" dur="10s" begin="3.3s" repeatCount="indefinite" /></path>
  </g>

  <!-- Row 2 (cols 0-3) → y~630 -->
  <g fill="none" stroke="url(#line-grad)" stroke-width="0.9" filter="url(#line-glow)">
    <path d="M492 348 q -160 70 -210 282" opacity="0.4"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="11s" begin="4s" repeatCount="indefinite" /></path>
    <path d="M496 348 q -80 70 -110 282" opacity="0.4"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="11s" begin="5s" repeatCount="indefinite" /></path>
    <path d="M504 348 q 80 70 110 282" opacity="0.4"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="11s" begin="6s" repeatCount="indefinite" /></path>
    <path d="M508 348 q 160 70 210 282" opacity="0.4"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="11s" begin="7s" repeatCount="indefinite" /></path>
  </g>

  <!-- Row 3 (cols 0-1) → y~740 -->
  <g fill="none" stroke="url(#line-grad)" stroke-width="0.8" filter="url(#line-glow)">
    <path d="M493 350 q -100 120 -170 390" opacity="0.35"><animate attributeName="stroke-dasharray" values="0 700;450 250;0 700" dur="12s" begin="8s" repeatCount="indefinite" /></path>
    <path d="M507 350 q 100 120 170 390" opacity="0.35"><animate attributeName="stroke-dasharray" values="0 700;450 250;0 700" dur="12s" begin="9s" repeatCount="indefinite" /></path>
  </g>
</svg>

<div class="container">
  <div class="center-brand">
    <div class="glow"></div>
    <h1>yannn8n.work</h1>
    <div class="subtitle">Personal Cloud Ecosystem</div>
  </div>

  <div class="section-label">Subdomains &amp; Services</div>

  <div class="services-grid" id="services-grid">
    <!-- Cards populated by JS -->
  </div>

  <div class="footer">
    <span class="count"><span id="service-count"></span> services</span>
    <span id="time-display"></span>
    <span>· <a href="https://github.com/ymseo741">GitHub</a></span>
    <span>· <a href="https://x.com/_neo_odn">𝕏</a></span>
  </div>
</div>

<script>
const services = [
  // Row 1: Core AI & Dev
  { name: 'Hermes',     url: 'https://hermes.yannn8n.work',    icon: '⚡',  desc: 'Agent Platform',            tag: 'tunnel', status: 'online' },
  { name: 'OpenCode',   url: 'https://opencode.yannn8n.work',  icon: '⌨️',  desc: 'Coding Agent',              tag: 'tunnel', status: 'online' },
  { name: 'OMNION',     url: 'https://omnion.yannn8n.work',    icon: '🔄',  desc: 'Web Interface',             tag: 'tunnel', status: 'online' },
  { name: 'Ollama',     url: 'https://ollama.yannn8n.work',    icon: '🧠',  desc: 'Local AI Models',           tag: 'tunnel', status: 'tunnel' },

  // Row 2: Infrastructure & Management
  { name: 'n8n',        url: 'https://n8n.yannn8n.work',       icon: '🔗',  desc: 'Workflow Automation',       tag: 'tunnel', status: 'tunnel' },
  { name: 'Vaultwarden',url: 'https://vault.yannn8n.work',     icon: '🔑',  desc: 'Password Manager',          tag: 'tunnel', status: 'tunnel' },
  { name: 'Log',        url: 'https://log.yannn8n.work',       icon: '📋',  desc: '업무 관리 시스템',            tag: 'netlify', status: 'external' },
  { name: 'Blog',       url: 'https://blog.yannn8n.work',      icon: '📝',  desc: 'Tech & Journal',            tag: 'netlify', status: 'external' },

  // Row 3: External Services
  { name: 'ODNMON',     url: 'https://odnmon.netlify.app',     icon: '📡',  desc: '관측기기 모니터링',            tag: 'netlify', status: 'external' },
  { name: 'NAS',        url: 'http://ymseo123132.asuscomm.com',icon: '🗄️',  desc: 'Network Storage',            tag: 'ddns',    status: 'nas' },
];

function renderGrid() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = services.map(s => `
    <a href="${s.url}" class="service-card" target="_blank" rel="noopener">
      <span class="icon">${s.icon}</span>
      <div class="name">
        ${s.name}
        <span class="status ${s.status}"></span>
      </div>
      <div class="desc">${s.desc}</div>
      <span class="tag">${s.tag}</span>
    </a>
  `).join('');
  document.getElementById('service-count').textContent = services.length;
}

// ===== Starfield Canvas =====
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let shootingStars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const STAR_COUNT = 200;

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      alpha: Math.random() * 0.7 + 0.2,
      speed: Math.random() * 0.012 + 0.003,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function spawnShootingStar() {
  if (shootingStars.length > 2) return;
  shootingStars.push({
    x: Math.random() * canvas.width * 0.6,
    y: Math.random() * canvas.height * 0.3,
    len: Math.random() * 120 + 60,
    speed: Math.random() * 4 + 3,
    alpha: 1,
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = Date.now() * 0.001;

  for (const s of stars) {
    const flicker = Math.sin(time * s.speed + s.phase) * 0.35 + 0.65;
    const alpha = s.alpha * flicker;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  }

  // Shooting stars
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    const tailX = s.x - s.len;
    const grad = ctx.createLinearGradient(tailX, s.y, s.x, s.y);
    grad.addColorStop(0, `rgba(255, 255, 255, 0)`);
    grad.addColorStop(1, `rgba(255, 255, 255, ${s.alpha})`);
    ctx.beginPath();
    ctx.moveTo(tailX, s.y);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2;
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed * 0.3;
    s.alpha -= 0.02;
    if (s.alpha <= 0) { shootingStars.splice(i, 1); }
  }
}

// Spawn shooting stars occasionally
setInterval(() => {
  if (Math.random() < 0.3) spawnShootingStar();
}, 3000);

// ===== Time Display =====
function updateTime() {
  const el = document.getElementById('time-display');
  if (!el) return;
  const now = new Date();
  const opts = { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', year: 'numeric', month: '2-digit', day: '2-digit' };
  const kst = now.toLocaleString('ko-KR', opts);
  el.textContent = '· ' + kst + ' KST';
}

// ===== Animation Loop =====
function animate() {
  drawStars();
  requestAnimationFrame(animate);
}

renderGrid();
updateTime();
setInterval(updateTime, 1000);
animate();

window.addEventListener('resize', () => {
  resize();
  initStars();
});
</script>
</body>
</html>
