<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yannn8n.work — Personal Cloud</title>
<meta name="description" content="Personal ecosystem dashboard for yannn8n.work — AI agents, automation, knowledge base and more." />
<meta property="og:title" content="yannn8n.work" />
<meta property="og:description" content="Personal ecosystem dashboard" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0a0e17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a0e17;
    --navy-2: #111827;
    --navy-3: #1e2d3d;
    --gold: #c49a3c;
    --gold-light: #f0c75e;
    --gold-glow: rgba(196, 154, 60, 0.3);
    --text: #e8e6e3;
    --text-dim: #8899aa;
    --card-bg: rgba(17, 24, 39, 0.75);
    --card-border: rgba(196, 154, 60, 0.15);
    --radius: 16px;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  /* ===== Canvas Background ===== */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ===== Main Container ===== */
  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* ===== SVG Topology ===== */
  #topology-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===== Center Brand ===== */
  .center-brand {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 3rem;
  }

  .center-brand .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse-glow 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.15); }
  }

  .center-brand h1 {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }

  .center-brand .subtitle {
    font-size: 0.9rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: var(--mono);
  }

  /* ===== Service Grid ===== */
  .services-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    max-width: 900px;
    width: 100%;
  }

  .service-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.25rem 1rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, transparent 40%, rgba(196, 154, 60, 0.05) 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .service-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 8px 40px rgba(196, 154, 60, 0.15);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card:active {
    transform: translateY(-2px);
  }

  .service-card .icon {
    font-size: 1.75rem;
    line-height: 1;
    margin-bottom: 0.5rem;
    display: block;
  }

  .service-card .name {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 0.15rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .service-card .name .status {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .status.online { background: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.6); }
  .status.offline { background: #64748b; }
  .status.external { background: var(--gold-light); box-shadow: 0 0 8px var(--gold-glow); }

  .service-card .desc {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .service-card .arrow {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(196, 154, 60, 0.1);
    border: 1px solid rgba(196, 154, 60, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--gold);
    transition: all 0.3s ease;
    opacity: 0;
  }

  .service-card:hover .arrow {
    opacity: 1;
  }

  /* ===== Footer ===== */
  .footer {
    position: relative;
    z-index: 2;
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(136, 153, 170, 0.5);
    font-family: var(--mono);
    letter-spacing: 0.1em;
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.3s;
  }

  .footer a:hover { opacity: 1; }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.9rem;
    }
    .center-brand h1 { font-size: 2rem; }
    .container { padding: 1.5rem; }
    .service-card { padding: 1rem 0.85rem; }
  }

  @media (max-width: 420px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0.65rem;
    }
    .service-card .icon { font-size: 1.3rem; }
    .service-card .name { font-size: 0.85rem; }
    .center-brand h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<svg id="topology-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c49a3c" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#c49a3c" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#c49a3c" stop-opacity="0.1" />
    </linearGradient>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Center node glow -->
  <circle cx="500" cy="380" r="60" fill="none" stroke="url(#line-grad)" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="40;65;40" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="380" r="40" fill="none" stroke="url(#line-grad)" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="30;50;30" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="380" r="18" fill="rgba(196,154,60,0.08)" stroke="#c49a3c" stroke-width="1.5" filter="url(#line-glow)" />

  <!-- Connecting lines from center to nodes -->
  <g id="lines" fill="none" stroke="url(#line-grad)" stroke-width="1.2" filter="url(#line-glow)">
    <!-- Positions: 8 nodes in arc below center -->
    <!-- Row 1 (4 nodes) -->
    <path d="M490 395 Q 330 430 150 580" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0 800;600 200;0 800" dur="8s" repeatCount="indefinite" />
    </path>
    <path d="M495 395 Q 400 420 340 580" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0 800;600 200;0 800" dur="8s" begin="1s" repeatCount="indefinite" />
    </path>
    <path d="M500 395 Q 500 420 500 580" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0 800;600 200;0 800" dur="8s" begin="2s" repeatCount="indefinite" />
    </path>
    <path d="M505 395 Q 600 420 660 580" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0 800;600 200;0 800" dur="8s" begin="3s" repeatCount="indefinite" />
    </path>
    <!-- Row 2 (4 nodes) -->
    <path d="M492 398 Q 280 470 130 700" opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0 900;600 300;0 900" dur="9s" begin="4s" repeatCount="indefinite" />
    </path>
    <path d="M496 398 Q 375 485 250 700" opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0 900;600 300;0 900" dur="9s" begin="5s" repeatCount="indefinite" />
    </path>
    <path d="M504 398 Q 625 485 750 700" opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0 900;600 300;0 900" dur="9s" begin="6s" repeatCount="indefinite" />
    </path>
    <path d="M508 398 Q 720 470 870 700" opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0 900;600 300;0 900" dur="9s" begin="7s" repeatCount="indefinite" />
    </path>
  </g>
</svg>

<div class="container">
  <div class="center-brand">
    <div class="glow"></div>
    <h1>yannn8n.work</h1>
    <div class="subtitle">Personal Cloud Ecosystem</div>
  </div>

  <div class="services-grid" id="services-grid">
    <!-- Cards populated by JS -->
  </div>

  <div class="footer">
    <span id="time-display"></span> &nbsp;·&nbsp; <a href="https://github.com/ymseo741">GitHub</a> &nbsp;·&nbsp; <a href="https://x.com/_neo_odn">𝕏</a>
  </div>
</div>

<script>
const services = [
  { name: 'Hermes',  url: 'https://hermes.yannn8n.work',    icon: '⚡',  desc: 'Agent Platform',       status: 'online' },
  { name: 'OpenCode',url: 'https://opencode.yannn8n.work',  icon: '⌨️', desc: 'Coding Agent',         status: 'online' },
  { name: 'Blog',    url: 'https://blog.yannn8n.work',      icon: '📝', desc: 'Tech & Journal',       status: 'external' },
  { name: 'n8n',     url: 'https://n8n.yannn8n.work',       icon: '🔗', desc: 'Workflow Automation',  status: 'offline' },
  { name: 'Ollama',  url: 'https://ollama.yannn8n.work',    icon: '🧠', desc: 'Local AI Models',      status: 'offline' },
  { name: 'Vault',   url: 'https://vault.yannn8n.work',     icon: '📚', desc: 'Knowledge Base',       status: 'offline' },
  { name: 'OMNION',  url: 'https://omnion.yannn8n.work',    icon: '🔄', desc: 'Web Interface',        status: 'online' },
  { name: 'Logs',    url: 'https://log.yannn8n.work',       icon: '📊', desc: 'Analytics',            status: 'external' },
];

function renderGrid() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = services.map(s => `
    <a href="${s.url}" class="service-card" target="_blank" rel="noopener">
      <span class="icon">${s.icon}</span>
      <div class="name">
        ${s.name}
        <span class="status ${s.status}"></span>
      </div>
      <div class="desc">${s.desc}</div>
      <span class="arrow">→</span>
    </a>
  `).join('');
}

// Starfield canvas
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const STAR_COUNT = 180;

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.8 + 0.2,
      speed: Math.random() * 0.015 + 0.005,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = Date.now() * 0.001;

  for (const s of stars) {
    const flicker = Math.sin(time * s.speed + s.phase) * 0.3 + 0.7;
    const alpha = s.alpha * flicker;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  }
}

// Update time display
function updateTime() {
  const el = document.getElementById('time-display');
  if (!el) return;
  const now = new Date();
  const kst = now.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false });
  el.textContent = 'KST ' + kst;
}

// Animation loop
function animate() {
  drawStars();
  requestAnimationFrame(animate);
}

renderGrid();
updateTime();
setInterval(updateTime, 1000);
animate();

// Redraw stars on resize
window.addEventListener('resize', () => {
  resize();
  initStars();
});
</script>
</body>
</html>
