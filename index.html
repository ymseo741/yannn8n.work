<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>yannn8n.work — Personal Cloud</title>
<meta name="description" content="Personal ecosystem dashboard for yannn8n.work — AI agents, automation, monitoring, cloud infrastructure and tools." />
<meta property="og:title" content="yannn8n.work" />
<meta property="og:description" content="Personal cloud ecosystem dashboard" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#0a0e17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a0e17;
    --gold: #c49a3c;
    --gold-light: #f0c75e;
    --gold-glow: rgba(196, 154, 60, 0.35);
    --text: #e8e6e3;
    --text-dim: #9aabbb;
    --text-muted: #6a7a8a;
    --card-bg: rgba(17, 24, 39, 0.65);
    --card-border: rgba(196, 154, 60, 0.1);
    --card-hover-border: rgba(196, 154, 60, 0.4);
    --radius: 16px;
    --font: 'Noto Sans KR', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Canvas ===== */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ===== Mouse glow overlay (JS-driven) ===== */
  #mouse-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: background 0.15s ease;
  }

  /* ===== Aurora overlay ===== */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 55% at 25% 25%, rgba(196, 154, 60, 0.04) 0%, transparent 70%),
      radial-gradient(ellipse 55% 45% at 75% 15%, rgba(100, 140, 200, 0.035) 0%, transparent 60%),
      radial-gradient(ellipse 65% 40% at 50% 80%, rgba(196, 154, 60, 0.03) 0%, transparent 60%);
  }

  /* ===== Container ===== */
  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  /* ===== SVG Topology ===== */
  #topology-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  /* ===== Center Brand ===== */
  .center-brand {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 1.6rem;
    user-select: none;
  }

  .center-brand .glow {
    position: absolute;
    width: 360px;
    height: 360px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse-glow 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.65; transform: translate(-50%, -50%) scale(1.12); }
  }

  .center-brand h1 {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f0c75e, #c49a3c, #d4a84a, #f0c75e);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
    position: relative;
    cursor: default;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .center-brand .subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    font-family: var(--mono);
    opacity: 0.7;
  }

  /* ===== Service Grid ===== */
  .services-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    max-width: 880px;
    width: 100%;
  }

  .service-card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.1rem 0.9rem 0.9rem;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), border-color 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    will-change: transform;
    transform-style: preserve-3d;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(135deg, transparent 30%, rgba(196, 154, 60, 0.07) 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .service-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, transparent 40%, rgba(196, 154, 60, 0.15), transparent 60%) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .service-card:hover {
    border-color: transparent;
    transform: translateY(-5px) scale(1.02);
    box-shadow:
      0 12px 50px rgba(196, 154, 60, 0.12),
      0 0 0 1px rgba(196, 154, 60, 0.08) inset;
  }

  .service-card:hover::before { opacity: 1; }
  .service-card:hover::after  { opacity: 1; }

  .service-card:active {
    transform: scale(0.97);
    transition-duration: 0.08s;
  }

  .service-card .icon {
    font-size: 1.7rem;
    line-height: 1;
    margin-bottom: 0.45rem;
    display: block;
    transition: transform 0.3s ease;
  }

  .service-card:hover .icon {
    transform: scale(1.15);
  }

  .service-card .name {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }

  .service-card .name .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    transition: box-shadow 0.3s;
  }

  .service-card:hover .status-dot {
    box-shadow: 0 0 10px currentColor !important;
  }

  .dot-online   { background: #4ade80; box-shadow: 0 0 5px rgba(74,222,128,0.5); color: #4ade80; }
  .dot-tunnel   { background: #60a5fa; box-shadow: 0 0 5px rgba(96,165,250,0.4); color: #60a5fa; }
  .dot-external { background: var(--gold-light); box-shadow: 0 0 5px var(--gold-glow); color: var(--gold-light); }
  .dot-nas      { background: #a78bfa; box-shadow: 0 0 5px rgba(167,139,250,0.4); color: #a78bfa; }
  .dot-cloud    { background: #f472b6; box-shadow: 0 0 5px rgba(244,114,182,0.4); color: #f472b6; }

  .service-card .desc {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 0.1rem;
    transition: color 0.3s;
  }

  .service-card:hover .desc {
    color: var(--text);
  }

  .service-card .tag {
    position: absolute;
    top: 0.55rem;
    right: 0.55rem;
    font-size: 0.55rem;
    font-family: var(--mono);
    padding: 0.12rem 0.4rem;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    background: rgba(255,255,255,0.025);
    letter-spacing: 0.05em;
    transition: all 0.3s;
    pointer-events: none;
  }

  .service-card:hover .tag {
    border-color: rgba(196, 154, 60, 0.2);
    color: var(--gold);
    background: rgba(196, 154, 60, 0.05);
  }

  /* ===== Footer ===== */
  .footer {
    position: relative;
    z-index: 2;
    margin-top: 1.2rem;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(136, 153, 170, 0.35);
    font-family: var(--mono);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .footer a:hover { opacity: 1; }

  .footer .count {
    color: var(--text-muted);
    opacity: 0.5;
  }

  /* ===== Responsove ===== */
  @media (max-width: 820px) {
    .services-grid { gap: 0.75rem; max-width: 600px; }
  }

  @media (max-width: 650px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
      max-width: 420px;
      gap: 0.65rem;
    }
    .center-brand h1 { font-size: 2.2rem; }
    .center-brand { margin-bottom: 1rem; }
    .container { padding: 0.8rem; }
    .service-card { padding: 0.85rem 0.7rem; }
    .service-card .icon { font-size: 1.4rem; }
    .service-card .name { font-size: 0.85rem; }
    .service-card .desc { font-size: 0.65rem; }
    .service-card .tag { display: none; }
    .footer { font-size: 0.6rem; }
  }

  @media (max-width: 380px) {
    .services-grid { gap: 0.5rem; }
    .center-brand h1 { font-size: 1.6rem; }
    .center-brand .subtitle { font-size: 0.65rem; letter-spacing: 0.2em; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="mouse-glow"></div>
<div class="aurora"></div>

<svg id="topology-svg" viewBox="0 0 1000 1100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c49a3c" stop-opacity="0.05"/>

    <path d="M496 240 q-90 70-120 345" opacity="0.35"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="12s" begin="9s" repeatCount="indefinite"/></path>

    <path d="M508 240 q180 70 220 345" opacity="0.35"><animate attributeName="stroke-dasharray" values="0 600;400 200;0 600" dur="12s" begin="11s" repeatCount="indefinite"/></path>

</svg>

<div class="container">
  <div class="center-brand">
    <div class="glow"></div>
    <h1>yannn8n.work</h1>
    <div class="subtitle">Personal Cloud Ecosystem</div>
  </div>

  <div class="services-grid" id="services-grid"></div>

  <div class="footer">
    <span class="count"><span id="service-count"></span> services</span>
    <span id="time-display"></span>
    <span>· <a href="https://github.com/ymseo741">GitHub</a></span>
  </div>
</div>

<script>
// ── Service data ──
const services = [
  { name: 'Hermes',     url: 'https://hermes.yannn8n.work',    icon: '⚡',  desc: 'Agent Platform',            tag: 'tunnel', cls: 'dot-online' },
  { name: 'OpenCode',   url: 'https://opencode.yannn8n.work',  icon: '⌨️', desc: 'Coding Agent',              tag: 'tunnel', cls: 'dot-online' },
  { name: 'OMNION',     url: 'https://omnion.yannn8n.work',    icon: '🔄', desc: 'Web Interface',             tag: 'tunnel', cls: 'dot-online' },
  { name: 'Ollama',     url: 'https://ollama.yannn8n.work',    icon: '🧠', desc: 'Local AI Models',           tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'n8n',        url: 'https://n8n.yannn8n.work',       icon: '🔗', desc: 'Workflow Automation',       tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'Vaultwarden',url: 'https://vault.yannn8n.work',     icon: '🔑', desc: 'Password Manager',          tag: 'tunnel', cls: 'dot-tunnel' },
  { name: 'Log',        url: 'https://log.yannn8n.work',       icon: '📋', desc: '업무 관리 시스템',            tag: 'netlify', cls: 'dot-external' },
  { name: 'Blog',       url: 'https://blog.yannn8n.work',      icon: '📝', desc: 'Tech & Journal',            tag: 'netlify', cls: 'dot-external' },
  { name: 'ODNMON',     url: 'https://odnmon.netlify.app',     icon: '📡', desc: '관측기기 모니터링',            tag: 'netlify', cls: 'dot-external' },
  { name: 'NAS',        url: 'http://ymseo123132.asuscomm.com',icon: '🗄️', desc: 'Network Storage',            tag: 'ddns',    cls: 'dot-nas' },
  { name: 'GitHub',     url: 'https://github.com/ymseo741',    icon: '💻', desc: 'Code Repository',            tag: 'ext',     cls: 'dot-external' },
  { name: 'Cloudflare', url: 'https://dash.cloudflare.com',    icon: '🌐', desc: 'Tunnel & DNS',              tag: 'ext',     cls: 'dot-cloud' },
  { name: 'Oracle VPC', url: 'https://cloud.oracle.com',       icon: '☁️', desc: 'Cloud Server Console',       tag: 'cloud',   cls: 'dot-cloud' },
  { name: 'AgentMail',  url: 'https://agentmail.to',           icon: '✉️', desc: 'AI Agent Mailbox',           tag: 'ext',     cls: 'dot-external' },
  { name: 'FlowStates',url: 'https://flowstates.netlify.app', icon: '🎵', desc: '인터렉티브 콘텐츠 뷰어',         tag: 'netlify', cls: 'dot-external' },
  { name: 'Tripverse', url: 'https://tripversemate.netlify.app',icon: '✈️', desc: '여행 플래너 메이트',            tag: 'netlify', cls: 'dot-external' },
];

function renderGrid() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = services.map(s => `
    <a href="${s.url}" class="service-card" target="_blank" rel="noopener">
      <span class="icon">${s.icon}</span>
      <div class="name">${s.name}<span class="status-dot ${s.cls}"></span></div>
      <div class="desc">${s.desc}</div>
      <span class="tag">${s.tag}</span>
    </a>
  `).join('');
  document.getElementById('service-count').textContent = services.length;
  attachCardTilt();
}

// ── Card tilt effect ──
function attachCardTilt() {
  const cards = document.querySelectorAll('.service-card');
  for (const card of cards) {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      const cx = r.width / 2;
      const cy = r.height / 2;
      const dx = (x - cx) / cx;       // -1..1
      const dy = (y - cy) / cy;       // -1..1
      const tiltX = -dy * 6;           // degrees
      const tiltY = dx * 6;
      card.style.transform = `perspective(600px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateY(-3px) scale(1.02)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  }
}

// ── Starfield canvas ──
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let shootingStars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const STAR_COUNT = 220;

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.6 + 0.3,
      alpha: Math.random() * 0.7 + 0.2,
      speed: Math.random() * 0.012 + 0.003,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function spawnShootingStar() {
  if (shootingStars.length > 3) return;
  const angle = Math.random() * 0.6 + 0.3;  // rad, shallow diagonal down-right
  const speed = Math.random() * 5 + 4;
  shootingStars.push({
    x: Math.random() * canvas.width * 0.5,
    y: Math.random() * canvas.height * 0.25,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: Math.random() * 100 + 50,
    alpha: 1,
  });
}

// ── Mouse glow ──
const glowEl = document.getElementById('mouse-glow');
let mouseX = -999, mouseY = -999;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('mouseleave', () => {
  mouseX = -999;
  mouseY = -999;
});

// ── Drawing ──
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = Date.now() * 0.001;

  // Stars
  for (const s of stars) {
    const flicker = Math.sin(time * s.speed + s.phase) * 0.35 + 0.65;
    const alpha = s.alpha * flicker;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fill();
  }

  // Shooting stars – tail aligns WITH movement direction
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    // Normalize direction
    const mag = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
    if (mag < 0.01) { shootingStars.splice(i, 1); continue; }
    const nx = s.vx / mag;
    const ny = s.vy / mag;
    // Tail = behind the head along movement vector
    const tailX = s.x - nx * s.len;
    const tailY = s.y - ny * s.len;

    const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.6, `rgba(255,255,255,${s.alpha * 0.7})`);
    grad.addColorStop(1, `rgba(255,255,255,${s.alpha})`);
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    s.x += s.vx;
    s.y += s.vy;
    s.alpha -= 0.015;
    if (s.alpha <= 0) { shootingStars.splice(i, 1); }
  }
}

// ── Mouse glow update (lightweight, not per frame) ──
function updateMouseGlow() {
  if (mouseX >= 0 && mouseY >= 0) {
    glowEl.style.background = `radial-gradient(ellipse 200px 200px at ${mouseX}px ${mouseY}px, rgba(196, 154, 60, 0.04) 0%, transparent 100%)`;
  } else {
    glowEl.style.background = 'none';
  }
  requestAnimationFrame(updateMouseGlow);
}

setInterval(() => { if (Math.random() < 0.35) spawnShootingStar(); }, 2500);

// ── Time ──
function updateTime() {
  const el = document.getElementById('time-display');
  if (!el) return;
  const now = new Date();
  const kst = now.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', year: 'numeric', month: '2-digit', day: '2-digit' });
  el.textContent = '· ' + kst + ' KST';
}

// ── Main loop ──
function animate() {
  drawStars();
  requestAnimationFrame(animate);
}

renderGrid();
updateTime();
setInterval(updateTime, 1000);
animate();
updateMouseGlow();

window.addEventListener('resize', () => { resize(); initStars(); });
</script>
</body>
</html>
